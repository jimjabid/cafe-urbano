# Decap CMS config — keep in sync with src/content.config.ts (the zod schemas are the contract).
# Regenerate/validate with the decap-config-writer skill after any schema change.

# DecapBridge PKCE auth (site 5213c873-14b8-4019-8e96-e410663cc9e0) — never Netlify Identity.
# Requires Decap CMS >= 3.8.3 (pinned in admin/index.html).
backend:
  name: git-gateway
  repo: jimjabid/cafe-urbano # the CLIENT repo, not the harness
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/5213c873-14b8-4019-8e96-e410663cc9e0/pkce
  auth_token_endpoint: /sites/5213c873-14b8-4019-8e96-e410663cc9e0/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: "content: create {{collection}} '{{slug}}' — {{author-name}} <{{author-login}}> via DecapBridge"
    update: "content: update {{collection}} '{{slug}}' — {{author-name}} <{{author-login}}> via DecapBridge"
    delete: "content: delete {{collection}} '{{slug}}' — {{author-name}} <{{author-login}}> via DecapBridge"
    uploadMedia: "content: upload '{{path}}' — {{author-name}} <{{author-login}}> via DecapBridge"
    deleteMedia: "content: delete '{{path}}' — {{author-name}} <{{author-login}}> via DecapBridge"

# PKCE identity claims (populate author name/avatar in the UI)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Harmless in prod — only activates when `npx decap-server` runs locally.
local_backend: true

# Cap uploads at 2 MB. astro:assets re-optimizes served images at build time,
# so this protects the git repo and build times, not the page weight.
media_library:
  config:
    max_file_size: 2097152

logo_url: https://jimjabid.github.io/cafe-urbano/og-logo.jpg
site_url: https://jimjabid.github.io/cafe-urbano
display_url: https://jimjabid.github.io/cafe-urbano

# GLOBAL fallback only — every image field below overrides these.
# media_folder = git path where Decap COMMITS uploads; public_folder = URL the site SERVES them from.
media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: settings
    label: "Sitio"
    files:
      - name: settings
        label: "Datos del negocio"
        file: "src/content/site/settings.yaml"
        fields:
          - { name: businessName, label: "Nombre del negocio", widget: string }
          - { name: tagline, label: "Frase / tagline", widget: string }
          - { name: greeting, label: "Saludo del menú (globo de diálogo)", widget: string }
          - { name: phone, label: "Teléfono", widget: string, required: false }
          - { name: whatsapp, label: "WhatsApp", widget: string, required: false }
          - { name: email, label: "Email", widget: string, required: false }
          - name: address
            label: "Dirección"
            widget: object
            fields:
              - { name: street, label: "Calle", widget: string }
              - { name: locality, label: "Localidad / Barrio", widget: string }
              - { name: region, label: "Provincia", widget: string }
              - { name: postalCode, label: "Código postal", widget: string }
              - { name: country, label: "País", widget: string, default: "AR" }
          - name: geo
            label: "Coordenadas"
            widget: object
            required: false
            fields:
              - { name: latitude, label: "Latitud", widget: number, value_type: float }
              - { name: longitude, label: "Longitud", widget: number, value_type: float }
          - { name: mapsUrl, label: "Link de Google Maps", widget: string, required: false }
          - name: hours
            label: "Horarios"
            widget: list
            fields:
              - { name: days, label: "Días", widget: string }
              - { name: opens, label: "Abre", widget: string }
              - { name: closes, label: "Cierra", widget: string }
          - { name: priceRange, label: "Rango de precios", widget: string, required: false }
          - name: socials
            label: "Redes"
            widget: list
            required: false
            fields:
              - { name: label, label: "Red", widget: string }
              - { name: url, label: "URL", widget: string }
          - { name: schemaType, label: "Tipo schema.org", widget: hidden, default: "CafeOrCoffeeShop" }
          - name: seo
            label: "SEO"
            widget: object
            fields:
              - { name: titleSuffix, label: "Sufijo de título", widget: string }
              - { name: description, label: "Meta description (máx. 160)", widget: text }
              # og-logo.jpg lives in public/ and Seo.astro resolves it against the site base URL
              - name: ogImage
                label: "Imagen para compartir"
                widget: image
                required: false
                media_folder: "/public"
                public_folder: "/"
                hint: "Máx. 2 MB — ideal 1200×630. Comprimila en squoosh.app si pesa más."

  - name: categories
    label: "Categorías del menú"
    folder: "src/content/categories"
    extension: "yaml"
    format: "yaml"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { name: title, label: "Título", widget: string }
      - { name: order, label: "Orden (sección y filtro)", widget: number, default: 0 }
      - name: dot
        label: "Color del punto"
        widget: select
        options: ["pink", "green", "peach", "olive", "mint", "yellow", "purple", "lime", "teal", "coral"]
      - name: placeholder
        label: "Ilustración por defecto"
        widget: select
        options: ["infusiones", "bakery", "salados"]
        default: "bakery"
        required: false
      - { name: note, label: "Nota (ej. horario)", widget: string, required: false }

  - name: dishes
    label: "Platos"
    folder: "src/content/dishes"
    create: true
    slug: "{{slug}}"
    identifier_field: name
    # Photos are committed next to the entries so astro:assets can optimize them;
    # public_folder "./images" writes the relative path image() expects.
    media_folder: "images"
    public_folder: "./images"
    fields:
      - { name: name, label: "Nombre", widget: string }
      - { name: variant, label: "Variante (mediano / grande / extra)", widget: string, required: false }
      - { name: price, label: "Precio (número, sin $)", widget: number, value_type: float }
      - name: category
        label: "Categoría"
        widget: relation
        collection: categories
        search_fields: [title]
        display_fields: [title]
        value_field: "{{slug}}"
      - { name: description, label: "Descripción", widget: text, required: false }
      - name: image
        label: "Foto (opcional)"
        widget: image
        required: false
        hint: "Máx. 2 MB. Si tu foto pesa más, comprimila gratis en squoosh.app y volvé a subirla."
      # zod defaults these — entries without them are valid, so the CMS must not demand them
      - { name: order, label: "Orden dentro de la categoría", widget: number, default: 0, required: false }
      - { name: available, label: "Disponible", widget: boolean, default: true, required: false }

  - name: promos
    label: "Promos / banners"
    folder: "src/content/promos"
    extension: "yaml"
    format: "yaml"
    create: true
    slug: "{{slug}}"
    identifier_field: text
    fields:
      - { name: text, label: "Texto de la promo", widget: text }
      - name: afterCategory
        label: "Mostrar después de la categoría"
        widget: relation
        collection: categories
        search_fields: [title]
        display_fields: [title]
        value_field: "{{slug}}"
      - { name: order, label: "Orden", widget: number, default: 0, required: false }
      - { name: enabled, label: "Activada", widget: boolean, default: true, required: false }
